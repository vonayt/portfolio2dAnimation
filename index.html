<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Animasi 2D | VonAyt</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">VonAyt</div>
            <ul class="nav-links">
                <li><a href="#">2D Animation</a></li>
                <li class="social-icons">
                    <a href="https://www.instagram.com/von_ayt/" target="_blank"><i class="fab fa-instagram"></i></a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="portfolio-grid">
        <div class="portfolio-item" onclick="openModal('dumpanimasi.mp4/YUTA VS YUJI part 1.mp4', 'Personal work Fan Animation', 'Directing, Storyboard, 2D Animation, Compositing, Background Paint')">
            <video autoplay loop muted playsinline>
                <source src="dumpanimasi.mp4/YUTA VS YUJI part 1.mp4" type="video/mp4">
            </video>
            <div class="overlay">
                <h3>Yuji vs Yuta part 1</h3>
                <p></p>
            </div>
        </div>
        
        <div class="portfolio-item" onclick="openModal('dumpanimasi.mp4/YUTA VS YUJI part 2 (1).mp4', 'Personal work Fan Animation', 'Directing, Storyboard, 2D Animation, Compositing, Background Paint')">
            <video autoplay loop muted playsinline>
                <source src="dumpanimasi.mp4/YUTA VS YUJI part 2 (1).mp4" type="video/mp4">
            </video>
            <div class="overlay">
                <h3>Yuji vs Yuta part 2</h3>
                <p></p>
            </div>
        </div>
        
        <div class="portfolio-item" onclick="openModal('dumpanimasi.gif/tes.gif', 'Character Idle', '2D Key Animation for personal project using Krita.')">
            <img src="dumpanimasi.gif/tes.gif" alt="Work">
            <div class="overlay">
                <h3>Character Idle</h3>
                <p></p>
            </div>
        </div>
        
        <div class="portfolio-item" onclick="openModal('Et398doPTKQ', 'Naruto vs Sasuke', 'Fan animation.')">
            <img src="https://img.youtube.com/vi/Et398doPTKQ/maxresdefault.jpg" alt="Thumbnail">
            <div class="overlay">
                <h3>Naruto vs Sasuke</h3>
                <p></p>
            </div>
        </div>
        
    </main>

    <div id="videoModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <div id="modalMedia"></div>
            
            <div class="modal-text">
                <h2 id="modalTitle"></h2>
                <p id="modalDesc"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
