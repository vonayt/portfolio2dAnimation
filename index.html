    <script src="script.js"></script>
    <script>
 
  const video1 = document.getElementById('thumb1');
  
  const start = 5; 
  const end = 10;

  video1.addEventListener('timeupdate', function() {
    if (this.currentTime >= end) {
      this.currentTime = start;
      this.play();
    }
  });
</script>
